apiVersion: apps/v1
kind: Deployment
metadata:
  name: abc-website
  namespace: abc-technologies
  labels:
    app: abc-website
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: abc-website
  template:
    metadata:
      labels:
        app: abc-website
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        graphite.metrics/enabled: "true"
    spec:
      containers:
        - name: website
          image: docker.io/DOCKERHUB_USERNAME/abc-technologies-website:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health.html
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health.html
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

