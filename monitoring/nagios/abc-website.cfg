define host {
    use                     linux-server
    host_name               abc-website
    alias                   ABC Technologies Website
    address                 abc-tech.local
    check_command           check-host-alive
    max_check_attempts      3
    check_interval          1
    retry_interval          1
}

define service {
    use                     generic-service
    host_name               abc-website
    service_description     HTTP Service
    check_command           check_http!-H abc-tech.local -u /health.html -e 200
    max_check_attempts      3
    check_interval          1
    retry_interval          1
}

