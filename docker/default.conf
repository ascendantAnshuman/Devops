server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    location = /health.html {
        access_log off;
        add_header Cache-Control "no-store";
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|svg|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}

